kind = "web"
previewPath = "/"
title = "Forester Dashboard"
version = "1.0.0"
id = "artifacts/forester-dash"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20532

[services.development]
run = "pnpm --filter @workspace/forester-dash run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/forester-dash", "run", "build" ]
publicDir = "artifacts/forester-dash/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20532"
BASE_PATH = "/"
